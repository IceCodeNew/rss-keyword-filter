name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.13"

      - name: Syntax check
        run: |
          python3 -m py_compile filter_rss.py
          python3 -m py_compile run_hourly_keyword.py
          python3 -m py_compile ops_monitor_keyword.py

      - name: Run unit tests
        run: python3 -m unittest discover tests -v
